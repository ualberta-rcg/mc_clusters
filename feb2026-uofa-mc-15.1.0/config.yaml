profile::freeipa::mokey::enable_user_signup: true
# Add users without admin approval
profile::freeipa::mokey::require_verify_admin: false

jupyterhub::jupyterhub_config_hash:
  SbatchForm:
    runtime:
      min: 3.0
      def: 4.0
      max: 5.0
    ui:
      def: 'rstudio'
      choices: ['rstudio', 'lab', 'terminal']
    memory:
      min: 1024
      def: 2000
      max: 4000
  SlurmFormSpawner:
    ui_args:
      lab:
        name: JupyterLab
      notebook:
        name: Jupyter Notebook
        url: '/tree'
      terminal:
        name: Terminal
        url: '/terminals/1'
      rstudio:
        name: RStudio 4.5
        url: '/rstudio'
        modules: ['rstudio-server/4.5']

fail2ban::custom_jails:
  'ssh-route':
    enabled: true
    filter: 'sshd'
    findtime: 3600
    bantime: 86400
    maxretry: 100
    action: 'route'
    logpath: '%(sshd_log)s'
  'ssh-ban-root':
    enabled: true
    findtime: 3600
    bantime: 86400
    maxretry: 0
    action: 'route'
    logpath: '%(sshd_log)s'
    journalmatch: '_SYSTEMD_UNIT=sshd.service + _COMM=sshd'
    filter_maxlines: 10
    filter_includes: 'before = common.conf'
    filter_failregex: '^%(__prefix_line)spam_unix\(sshd:auth\):\s+authentication failure;\s*logname=\S*\s*uid=\d*\s*euid=\d*\s*tty=\S*\s*ruser=\S*\s*rhost=<HOST>\S*\s*user=(root|admin)\s.*$'

profile::software_stack::extra_site_env_vars:
  R_LIBS: '/project/def-sponsor00/R_4.5_LIBS'
